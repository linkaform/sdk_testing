# Archivo de configuracion pytest para Accesos
[pytest]
log_cli = true
log_cli_level = INFO
pythonpath = 
    .
    /usr/local/lib/python3.10/site-packages/lkf_modules/accesos/items/scripts/Accesos
filterwarnings =
    ignore:Unverified HTTPS request
markers =
    unit: Pruebas unitarias (sin red, sin BD, todo mockeado)
    integration: Pruebas de integración (requieren API de Linkaform activa)
    e2e: Pruebas end-to-end (requieren API de Linkaform activa y entorno de pruebas configurado)